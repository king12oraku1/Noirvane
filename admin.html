<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Noirvane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="admin">
  <nav class="navbar" role="navigation">
    <div class="nav-container">
      <a href="index.html" class="logo">NOIR<span>VANE</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Storefront</a></li>
        <li><a href="admin.html">Dashboard</a></li>
      </ul>
      <div class="nav-actions">
        <span style="color:var(--text-muted);font-size:0.85rem;">Admin Panel</span>
      </div>
    </div>
  </nav>

  <main class="admin-page">
    <div class="admin-header">
      <h1>Dashboard</h1>
      <div style="display:flex;gap:0.75rem;">
        <button class="admin-btn admin-btn-add" id="addProductBtn"><i class="fas fa-plus"></i> Add Product</button>
        <button class="admin-btn" id="viewOrders" style="background:var(--surface);border:1px solid var(--glass-border);color:var(--text);"><i class="fas fa-box"></i> Orders</button>
        <button class="admin-btn" id="refreshData" style="background:var(--surface);border:1px solid var(--glass-border);color:var(--text);"><i class="fas fa-sync"></i> Refresh</button>
      </div>
    </div>

    <div class="admin-stats" id="adminStats"></div>

    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Badge</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>

    <div class="orders-section" id="ordersSection" style="display:none;">
      <h2>Recent Orders</h2>
      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th></tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal" id="productModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <button class="modal-close" id="closeModal" aria-label="Close modal"><i class="fas fa-times"></i></button>
      <h2 id="modalTitle">Add New Product</h2>
      <form id="productForm">
        <input type="hidden" id="productId">

        <div class="form-group"><label>Product Name</label><input type="text" id="pName" required placeholder="e.g. Midnight Oversized Hoodie"></div>

        <div class="form-row">
          <div class="form-group"><label>Price ($)</label><input type="number" id="pPrice" required step="0.01" min="0" placeholder="189.00"></div>
          <div class="form-group"><label>Sale Price ($) <small style="color:var(--text-muted);">Optional</small></label><input type="number" id="pSale" step="0.01" min="0" placeholder="149.00"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="pCategory" required>
              <option value="tops">Tops</option>
              <option value="hoodies">Hoodies & Sweatshirts</option>
              <option value="outerwear">Outerwear</option>
              <option value="bottoms">Bottoms</option>
              <option value="footwear">Footwear</option>
              <option value="accessories">Accessories</option>
            </select>
          </div>
          <div class="form-group"><label>Subcategory</label><input type="text" id="pSub" required placeholder="e.g. Hoodies"></div>
        </div>

        <div class="form-row">
          <div class="form-group"><label>Stock</label><input type="number" id="pStock" required min="0" value="20"></div>
          <div class="form-group">
            <label>Badge</label>
            <select id="pBadge">
              <option value="">None</option>
              <option value="New">New</option>
              <option value="Sale">Sale</option>
              <option value="Trending">Trending</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group"><label>Fit</label><input type="text" id="pFit" required placeholder="e.g. Oversized, Slim, Baggy" value="Regular"></div>
          <div class="form-group"><label>Material</label><input type="text" id="pMaterial" required placeholder="e.g. Cotton Fleece" value="Premium Cotton"></div>
        </div>

        <div class="form-group"><label>Colors (comma separated)</label><input type="text" id="pColors" required placeholder="Black, White, Navy" value="Black"></div>
        <div class="form-group"><label>Sizes (comma separated)</label><input type="text" id="pSizes" required placeholder="S, M, L, XL" value="S, M, L, XL, XXL"></div>

        <div class="form-group"><label>Description</label><textarea id="pDesc" rows="3" required placeholder="Product description..."></textarea></div>

        <div class="form-group"><label>Image URL</label><input type="text" id="pImage" placeholder="https://example.com/image.jpg"></div>
        <div class="form-group"><label>Or Upload Image</label><input type="file" id="pImageFile" accept="image/*" style="padding:0.5rem;"></div>

        <img id="imgPreview" alt="Preview">

        <button type="submit" class="checkout-btn" style="width:100%;margin-top:1rem;">Save Product</button>
      </form>
    </div>
  </div>
<script src="js/adminpassword.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
